# =============================================================================
# PDFKit Ingress — External Traffic Entry Point
#
# Routes all external HTTP traffic to the api-gateway service.
# The api-gateway then proxies to individual microservices internally.
#
# Prerequisites:
#   Install nginx ingress controller:
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm install ingress-nginx ingress-nginx/ingress-nginx --namespace ingress-nginx --create-namespace
#
# TLS (HTTPS):
#   Install cert-manager for automatic Let's Encrypt certificates:
#   helm install cert-manager jetstack/cert-manager --namespace cert-manager --create-namespace --set installCRDs=true
#
# After installing cert-manager, uncomment the tls section below and
# replace "pdfkit.yourdomain.com" with your actual domain.
#
# Local testing (minikube):
#   minikube addons enable ingress
#   Add to /etc/hosts: <minikube-ip> pdfkit.local
#   Then access: http://pdfkit.local
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pdfkit-ingress
  namespace: pdfkit
  labels:
    app.kubernetes.io/name: pdfkit
    app.kubernetes.io/component: ingress
  annotations:
    # Use nginx ingress controller
    kubernetes.io/ingress.class: "nginx"

    # Increase body size limit to 100MB for PDF uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

    # Increase timeouts for heavy operations (LibreOffice, Ghostscript, Chromium)
    # These can take up to 5 minutes for large files
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"

    # Enable gzip compression for API responses
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization, x-request-id"

    # Rate limiting at the Ingress level (additional layer on top of app-level limits)
    # 100 requests per minute per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"

    # TLS redirect — uncomment when TLS is configured
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # cert-manager annotation — uncomment when cert-manager is installed
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # TLS configuration — uncomment and configure for HTTPS
  # tls:
  #   - hosts:
  #       - pdfkit.yourdomain.com
  #     secretName: pdfkit-tls-secret

  rules:
    # Replace with your actual domain in production
    # For local testing with minikube, use pdfkit.local
    - host: pdfkit.local
      http:
        paths:
          # All traffic goes to api-gateway — it handles routing to microservices
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
