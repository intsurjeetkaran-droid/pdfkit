# =============================================================================
# Storage Service Deployment
#
# Handles: guest upload-temp, download, delete, auto-cleanup (1-hour TTL)
# Database: MySQL (via Prisma) — stores file metadata
# File storage: MinIO — stores actual file bytes
#
# This service is the most critical for MinIO integration:
#   - Upload: receives file → stores in MinIO → saves metadata to MySQL
#   - Download: reads metadata from MySQL → streams file from MinIO
#   - Cleanup: deletes expired records from MySQL + objects from MinIO
#
# Scaling: 2–8 pods. All pods share the same MySQL + MinIO.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-service
  namespace: pdfkit
  labels:
    app.kubernetes.io/name: storage-service
    app.kubernetes.io/component: storage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storage-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: storage-service
        app.kubernetes.io/name: storage-service
        app.kubernetes.io/component: storage
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: storage-service
      containers:
        - name: storage-service
          image: pdfkit/storage-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
              name: http
          envFrom:
            - configMapRef:
                name: pdfkit-config
          env:
            # Database URL from Secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pdfkit-secrets
                  key: DATABASE_URL
            # MinIO credentials from Secret
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: pdfkit-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pdfkit-secrets
                  key: MINIO_SECRET_KEY
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: storage-service
  namespace: pdfkit
  labels:
    app.kubernetes.io/name: storage-service
    app.kubernetes.io/component: storage
spec:
  selector:
    app: storage-service
  ports:
    - port: 3003
      targetPort: 3003
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: storage-service-hpa
  namespace: pdfkit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: storage-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
