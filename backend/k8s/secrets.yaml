# =============================================================================
# PDFKit Secrets — Sensitive credentials
#
# ⚠️  IMPORTANT: This file contains base64-encoded placeholder values.
#     Before deploying to production:
#       1. Replace ALL values with your real credentials
#       2. Encode them: echo -n "your-value" | base64
#       3. NEVER commit real secrets to git — use a secrets manager instead
#          (AWS Secrets Manager, HashiCorp Vault, Sealed Secrets, etc.)
#
# Current placeholder values (base64 of the literal strings shown):
#   MYSQL_ROOT_PASSWORD: "root"         → cm9vdA==
#   MYSQL_DATABASE:      "pdfkit"       → cGRma2l0
#   DATABASE_URL:        mysql://root:root@mysql:3306/pdfkit
#   MINIO_ROOT_USER:     "minioadmin"   → bWluaW9hZG1pbg==
#   MINIO_ROOT_PASSWORD: "minioadmin"   → bWluaW9hZG1pbg==
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: pdfkit-secrets
  namespace: pdfkit
  labels:
    app.kubernetes.io/name: pdfkit
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # MySQL credentials
  # Decode: echo "cm9vdA==" | base64 -d  → root
  MYSQL_ROOT_PASSWORD: cm9vdA==
  MYSQL_DATABASE: cGRma2l0

  # Full Prisma DATABASE_URL for storage-service
  # mysql://root:root@mysql:3306/pdfkit
  DATABASE_URL: bXlzcWw6Ly9yb290OnJvb3RAbXlzcWw6MzMwNi9wZGZraXQ=

  # MinIO credentials — change before production
  MINIO_ROOT_USER: bWluaW9hZG1pbg==
  MINIO_ROOT_PASSWORD: bWluaW9hZG1pbg==
  MINIO_ACCESS_KEY: bWluaW9hZG1pbg==
  MINIO_SECRET_KEY: bWluaW9hZG1pbg==
