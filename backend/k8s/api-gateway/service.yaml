# =============================================================================
# API Gateway Service
#
# ClusterIP: internal access from within the cluster (used by Ingress)
# The Ingress controller routes external traffic to this service.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: pdfkit
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
