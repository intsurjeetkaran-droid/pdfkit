# =============================================================================
# Organization Service Deployment
# Handles: reorder, duplicate, remove pages (pdf-lib — pure Node.js)
# Scaling: 2–8 pods on CPU > 70%
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: organization-service
  namespace: pdfkit
  labels:
    app.kubernetes.io/name: organization-service
    app.kubernetes.io/component: organization
spec:
  replicas: 2
  selector:
    matchLabels:
      app: organization-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: organization-service
        app.kubernetes.io/name: organization-service
        app.kubernetes.io/component: organization
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: organization-service
      containers:
        - name: organization-service
          image: pdfkit/organization-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3007
              name: http
          envFrom:
            - configMapRef:
                name: pdfkit-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: pdfkit-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pdfkit-secrets
                  key: MINIO_SECRET_KEY
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: organization-service
  namespace: pdfkit
  labels:
    app.kubernetes.io/name: organization-service
    app.kubernetes.io/component: organization
spec:
  selector:
    app: organization-service
  ports:
    - port: 3007
      targetPort: 3007
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: organization-service-hpa
  namespace: pdfkit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: organization-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
